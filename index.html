<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAS Dépannage — Remorquage & Assistance Lyon 7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================================
   CSS VARIABLES & RESET
   ============================================ */
:root {
  --bg-primary: #08111f;
  --bg-secondary: #0d1a2e;
  --bg-card: #0f1f35;
  --bg-card-hover: #132540;
  --gold: #c9963a;
  --gold-light: #e8b96a;
  --gold-dark: #a07828;
  --text-primary: #f0e8d8;
  --text-secondary: #9aabb8;
  --text-muted: #5a7080;
  --red-banner: #991b1b;
  --border: rgba(201, 150, 58, 0.2);
  --border-strong: rgba(201, 150, 58, 0.5);
  --shadow-gold: 0 0 40px rgba(201, 150, 58, 0.15);
  --font-serif: 'Playfair Display', serif;
  --font-sans: 'DM Sans', sans-serif;
  --nav-height: 72px;
  --banner-height: 44px;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  background-color: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-weight: 400;
  line-height: 1.6;
  overflow-x: hidden;
}

img { max-width: 100%; display: block; }
a { text-decoration: none; color: inherit; }
ul { list-style: none; }

/* ============================================
   TIMER BANNER
   ============================================ */
#timer-banner {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: var(--red-banner);
  height: var(--banner-height);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 0.82rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: #fff;
  border-bottom: 1px solid rgba(255,255,255,0.15);
}

#timer-banner .pulse-dot {
  width: 7px;
  height: 7px;
  background: #fff;
  border-radius: 50%;
  animation: pulseDot 1.2s ease-in-out infinite;
}

@keyframes pulseDot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.6); }
}

#countdown {
  font-family: 'Courier New', monospace;
  font-size: 1rem;
  font-weight: 700;
  background: rgba(0,0,0,0.25);
  padding: 2px 10px;
  border-radius: 4px;
  letter-spacing: 0.08em;
}

/* ============================================
   NAVIGATION
   ============================================ */
#navbar {
  position: sticky;
  top: var(--banner-height);
  z-index: 900;
  height: var(--nav-height);
  background: rgba(8, 17, 31, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5%;
  transition: background 0.3s ease;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-logo-icon {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
}

.nav-logo-text {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}

.nav-logo-name {
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 1.05rem;
  color: var(--text-primary);
  letter-spacing: 0.02em;
}

.nav-logo-sub {
  font-size: 0.68rem;
  color: var(--gold);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 500;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 32px;
}

.nav-links a {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  transition: color 0.3s ease;
  position: relative;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -3px;
  left: 0;
  width: 0;
  height: 1px;
  background: var(--gold);
  transition: width 0.3s ease;
}

.nav-links a:hover { color: var(--gold); }
.nav-links a:hover::after { width: 100%; }

.btn-call-nav {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #fff !important;
  font-family: var(--font-sans);
  font-size: 0.8rem !important;
  font-weight: 600;
  padding: 10px 22px;
  border-radius: 50px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: all 0.3s ease !important;
  box-shadow: 0 4px 20px rgba(201, 150, 58, 0.3);
  white-space: nowrap;
}

.btn-call-nav:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(201, 150, 58, 0.5) !important;
}

.btn-call-nav::after { display: none !important; }

.nav-hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
}

.nav-hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--text-primary);
  border-radius: 2px;
  transition: all 0.3s;
}

/* ============================================
   HERO SECTION
   ============================================ */
#hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  padding: 0 8%;
  position: relative;
  overflow: hidden;
}

/* Background grid */
#hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(201, 150, 58, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201, 150, 58, 0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

/* Radial glow */
#hero::after {
  content: '';
  position: absolute;
  top: -20%;
  right: -10%;
  width: 70vw;
  height: 70vw;
  background: radial-gradient(circle, rgba(201,150,58,0.08) 0%, transparent 65%);
  pointer-events: none;
}

.hero-tag {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(201, 150, 58, 0.1);
  border: 1px solid var(--border-strong);
  border-radius: 50px;
  padding: 6px 18px;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 30px;
}

.hero-tag::before {
  content: '';
  width: 6px;
  height: 6px;
  background: var(--gold);
  border-radius: 50%;
  animation: pulseDot 1.5s ease-in-out infinite;
}

.hero-title {
  font-family: var(--font-serif);
  font-size: clamp(2.4rem, 6vw, 5.5rem);
  font-weight: 700;
  line-height: 1.12;
  color: var(--text-primary);
  max-width: 750px;
  margin-bottom: 24px;
}

.hero-title em {
  font-style: italic;
  color: var(--gold);
  display: block;
}

.hero-subtitle {
  font-size: clamp(0.95rem, 1.5vw, 1.1rem);
  color: var(--text-secondary);
  max-width: 520px;
  line-height: 1.75;
  margin-bottom: 44px;
  font-weight: 300;
}

.hero-ctas {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 60px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #fff;
  font-family: var(--font-sans);
  font-weight: 600;
  font-size: 0.88rem;
  letter-spacing: 0.05em;
  padding: 16px 36px;
  border-radius: 50px;
  box-shadow: 0 8px 30px rgba(201, 150, 58, 0.35);
  transition: all 0.35s ease;
  text-transform: uppercase;
  white-space: nowrap;
}

.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 16px 45px rgba(201, 150, 58, 0.55);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: transparent;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: 0.88rem;
  letter-spacing: 0.05em;
  padding: 15px 32px;
  border-radius: 50px;
  border: 1px solid var(--border-strong);
  transition: all 0.35s ease;
  text-transform: uppercase;
  white-space: nowrap;
}

.btn-secondary:hover {
  background: rgba(201, 150, 58, 0.08);
  border-color: var(--gold);
  color: var(--gold);
  transform: translateY(-2px);
}

.hero-stats {
  display: flex;
  align-items: center;
  gap: 0;
  flex-wrap: wrap;
}

.hero-stat {
  padding: 0 32px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.hero-stat:first-child { padding-left: 0; }
.hero-stat:last-child { border-right: none; }

.stat-number {
  font-family: var(--font-serif);
  font-size: clamp(1.8rem, 3vw, 2.5rem);
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}

.stat-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
}

.hero-scroll {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--text-muted);
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.hero-scroll-line {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, var(--gold), transparent);
  animation: scrollLine 1.8s ease-in-out infinite;
}

@keyframes scrollLine {
  0% { transform: scaleY(0); transform-origin: top; }
  50% { transform: scaleY(1); transform-origin: top; }
  50.01% { transform-origin: bottom; }
  100% { transform: scaleY(0); transform-origin: bottom; }
}

/* ============================================
   TRUST RIBBON
   ============================================ */
#trust {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 28px 5%;
}

.trust-grid {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px 32px;
}

.trust-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.03em;
  white-space: nowrap;
}

.trust-check {
  color: var(--gold);
  font-size: 0.9rem;
  font-weight: 700;
}

.trust-divider {
  width: 1px;
  height: 18px;
  background: var(--border);
}

/* ============================================
   MARQUEE
   ============================================ */
#marquee-section {
  padding: 22px 0;
  background: var(--bg-primary);
  overflow: hidden;
  border-bottom: 1px solid var(--border);
  position: relative;
}

#marquee-section::before,
#marquee-section::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  width: 120px;
  z-index: 2;
  pointer-events: none;
}

#marquee-section::before {
  left: 0;
  background: linear-gradient(to right, var(--bg-primary), transparent);
}

#marquee-section::after {
  right: 0;
  background: linear-gradient(to left, var(--bg-primary), transparent);
}

.marquee-track {
  display: flex;
  align-items: center;
  gap: 0;
  animation: marquee 28s linear infinite;
  width: max-content;
}

@keyframes marquee {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

.marquee-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 36px;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  white-space: nowrap;
  border-right: 1px solid var(--border);
  transition: color 0.3s;
}

.marquee-item:hover { color: var(--gold); }

.marquee-dot {
  width: 5px;
  height: 5px;
  background: var(--gold);
  border-radius: 50%;
  flex-shrink: 0;
}

/* ============================================
   SERVICES SECTION
   ============================================ */
#services {
  padding: 100px 8%;
}

.section-header {
  margin-bottom: 64px;
}

.section-tag {
  display: inline-block;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 14px;
}

.section-title {
  font-family: var(--font-serif);
  font-size: clamp(1.8rem, 4vw, 3rem);
  font-weight: 700;
  line-height: 1.2;
  color: var(--text-primary);
  max-width: 500px;
}

.section-title em {
  font-style: italic;
  color: var(--gold);
}

.section-desc {
  font-size: 0.95rem;
  color: var(--text-secondary);
  max-width: 480px;
  margin-top: 16px;
  line-height: 1.8;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 2px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}

.service-card {
  background: var(--bg-card);
  padding: 44px 36px;
  position: relative;
  overflow: hidden;
  cursor: default;
  transition: background 0.4s ease;
}

.service-card::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 0;
  height: 3px;
  background: linear-gradient(to right, var(--gold), var(--gold-light));
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.service-card:hover {
  background: var(--bg-card-hover);
}

.service-card:hover::before {
  width: 100%;
}

.service-num {
  font-family: var(--font-serif);
  font-size: 3.5rem;
  font-weight: 700;
  color: rgba(201, 150, 58, 0.12);
  line-height: 1;
  margin-bottom: 20px;
  transition: color 0.4s;
}

.service-card:hover .service-num {
  color: rgba(201, 150, 58, 0.22);
}

.service-icon {
  font-size: 2rem;
  margin-bottom: 18px;
  display: block;
}

.service-name {
  font-family: var(--font-serif);
  font-size: 1.22rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 14px;
  line-height: 1.3;
}

.service-desc {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.75;
}

.service-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 22px;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0;
  transform: translateX(-8px);
  transition: all 0.4s ease;
}

.service-card:hover .service-link {
  opacity: 1;
  transform: translateX(0);
}

/* ============================================
   TESTIMONIALS
   ============================================ */
#testimonials {
  padding: 100px 8%;
  background: var(--bg-secondary);
  position: relative;
  overflow: hidden;
}

#testimonials::before {
  content: '"';
  position: absolute;
  top: -40px;
  left: 5%;
  font-family: var(--font-serif);
  font-size: 25rem;
  color: rgba(201, 150, 58, 0.03);
  line-height: 1;
  pointer-events: none;
}

.testimonials-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 28px;
  margin-top: 60px;
}

.testi-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px 32px;
  transition: all 0.4s ease;
  position: relative;
  overflow: hidden;
}

.testi-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  opacity: 0;
  transition: opacity 0.4s;
}

.testi-card:hover {
  border-color: var(--border-strong);
  transform: translateY(-6px);
  box-shadow: var(--shadow-gold);
}

.testi-card:hover::before { opacity: 1; }

.testi-stars {
  display: flex;
  gap: 3px;
  margin-bottom: 20px;
}

.testi-stars span {
  color: var(--gold);
  font-size: 0.9rem;
}

.testi-quote {
  font-family: var(--font-serif);
  font-size: 1rem;
  font-style: italic;
  color: var(--text-primary);
  line-height: 1.75;
  margin-bottom: 28px;
  position: relative;
}

.testi-author {
  display: flex;
  align-items: center;
  gap: 14px;
  border-top: 1px solid var(--border);
  padding-top: 22px;
}

.testi-avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-serif);
  font-weight: 700;
  font-size: 1rem;
  color: #fff;
  flex-shrink: 0;
}

.testi-info-name {
  font-weight: 600;
  font-size: 0.88rem;
  color: var(--text-primary);
}

.testi-info-sub {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ============================================
   FINAL CTA SECTION
   ============================================ */
#cta-final {
  padding: 100px 8%;
  position: relative;
  overflow: hidden;
}

#cta-final::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(201, 150, 58, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201, 150, 58, 0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

.cta-inner {
  max-width: 900px;
  margin: 0 auto;
  text-align: center;
  position: relative;
  z-index: 1;
}

.cta-badge {
  display: inline-block;
  background: rgba(201, 150, 58, 0.12);
  border: 1px solid var(--border-strong);
  color: var(--gold);
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 6px 18px;
  border-radius: 50px;
  margin-bottom: 30px;
}

.cta-title {
  font-family: var(--font-serif);
  font-size: clamp(2rem, 5vw, 3.8rem);
  font-weight: 700;
  line-height: 1.15;
  color: var(--text-primary);
  margin-bottom: 20px;
}

.cta-title em {
  font-style: italic;
  color: var(--gold);
}

.cta-subtitle {
  font-size: 1rem;
  color: var(--text-secondary);
  line-height: 1.75;
  max-width: 520px;
  margin: 0 auto 50px;
}

.price-box {
  background: var(--bg-card);
  border: 1px solid var(--border-strong);
  border-radius: 20px;
  padding: 44px 44px 40px;
  max-width: 520px;
  margin: 0 auto 44px;
  position: relative;
  overflow: hidden;
}

.price-box::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(to right, var(--gold-dark), var(--gold-light), var(--gold-dark));
}

.price-box-label {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 12px;
}

.price-box-title {
  font-family: var(--font-serif);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 24px;
}

.price-box-features {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 32px;
  text-align: left;
}

.price-feature {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.88rem;
  color: var(--text-secondary);
}

.price-feature-check {
  color: var(--gold);
  font-weight: 700;
  flex-shrink: 0;
}

.price-cta {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.price-phone {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  color: #fff;
  font-family: var(--font-sans);
  font-weight: 700;
  font-size: 1.1rem;
  padding: 18px 36px;
  border-radius: 50px;
  box-shadow: 0 8px 30px rgba(201, 150, 58, 0.35);
  transition: all 0.35s ease;
  letter-spacing: 0.04em;
}

.price-phone:hover {
  transform: translateY(-3px);
  box-shadow: 0 16px 45px rgba(201, 150, 58, 0.55);
  color: #fff;
}

.price-note {
  font-size: 0.76rem;
  color: var(--text-muted);
  text-align: center;
}

.cta-trust-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
  flex-wrap: wrap;
}

.cta-trust-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.78rem;
  color: var(--text-muted);
  font-weight: 500;
}

.cta-trust-item span { color: var(--gold); }

/* ============================================
   FOOTER
   ============================================ */
footer {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  padding: 52px 8%;
}

.footer-inner {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 40px
